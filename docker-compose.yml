services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hosting-portal-backend
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      BACKEND_PORT: 3001
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-change-in-production}
      JWT_EXPIRATION: 24h
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-dev-encryption-key-32-chars!!!}
      DB_PATH: ./data/hosting.db
    volumes:
      - ./backend/data:/app/data
      - ./backend:/app
      - /app/node_modules
    networks:
      - hosting-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hosting-portal-frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:3001/api
      NODE_ENV: development
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - /app/node_modules
    networks:
      - hosting-network
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

networks:
  hosting-network:
    driver: bridge

volumes:
  backend-data:
    driver: local
