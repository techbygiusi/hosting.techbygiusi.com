services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hosting-portal-backend
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      BACKEND_PORT: 3001
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-change-in-production}
      JWT_EXPIRATION: 24h
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-dev-encryption-key-32-chars!!!}
      DB_PATH: ./data/hosting.db
    volumes:
      - ./backend/data:/app/data
      - ./backend:/app
      - /app/node_modules
    networks:
      - hosting-network
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - >
          node -e "const http = require('http'); const port = process.env.BACKEND_PORT || 3001; const req = http.get({ hostname: '127.0.0.1', port, path: '/api/health', timeout: 3000 }, (res) => { process.exit(res.statusCode === 200 ? 0 : 1); }); req.on('timeout', () => { req.destroy(); process.exit(1); }); req.on('error', () => process.exit(1));"
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hosting-portal-frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:3001/api
      NODE_ENV: development
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - /app/node_modules
    networks:
      - hosting-network
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

networks:
  hosting-network:
    driver: bridge

volumes:
  backend-data:
    driver: local
