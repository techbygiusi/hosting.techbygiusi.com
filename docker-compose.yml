services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: picly-backend
    environment:
      NODE_ENV: production
      BACKEND_PORT: 3001
      DATA_DIR: /app/data
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-24h}
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-25}
      MAX_UPLOAD_FILES: ${MAX_UPLOAD_FILES:-30}
      MAX_PARALLEL_UPLOADS: ${MAX_PARALLEL_UPLOADS:-24}
      MIN_FREE_SPACE_MB: ${MIN_FREE_SPACE_MB:-250}
      UPLOAD_REQUEST_TIMEOUT_MS: ${UPLOAD_REQUEST_TIMEOUT_MS:-600000}
    volumes:
      - ./data:/app/data
    networks:
      - picly-network
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - >
          node -e "const http = require('http'); const port = process.env.BACKEND_PORT || 3001; const req = http.get({ hostname: '127.0.0.1', port, path: '/api/health', timeout: 3000 }, (res) => { process.exit(res.statusCode === 200 ? 0 : 1); }); req.on('timeout', () => { req.destroy(); process.exit(1); }); req.on('error', () => process.exit(1));"
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: picly-frontend
    ports:
      - "${PICLY_HTTP_PORT:-3002}:80"
    networks:
      - picly-network
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://127.0.0.1/ >/dev/null || exit 1
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

networks:
  picly-network:
    driver: bridge
