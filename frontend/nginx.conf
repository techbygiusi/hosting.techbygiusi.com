server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  client_max_body_size 20m;

  # Docker's embedded DNS resolver keeps the backend hostname fresh after
  # container recreates. Without this, Nginx can retain a stale backend IP and
  # return 502 until the frontend container is restarted as well.
  resolver 127.0.0.11 valid=10s ipv6=off;
  set $backend_upstream http://backend:3001;

  # WebSocket console proxy (backend SSH relay)
  location /api/console/ws {
    proxy_pass $backend_upstream;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }

  location /api/ {
    proxy_pass $backend_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 10s;
    proxy_send_timeout 900s;
    proxy_read_timeout 900s;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
